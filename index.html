<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mono Circle Arena</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="panel side-panel">
        <h1>Mono Circle Arena</h1>
        <p class="intro">
          처음부터 2개의 공 입력칸이 준비되어 있습니다. 이름과 추가 스탯을 적고,
          <strong>+</strong> 버튼으로 입력칸을 늘린 뒤 <strong>시작</strong>을 누르면 한 번에 입장합니다.
        </p>

        <section class="input-box">
          <div class="section-header">
            <h2>공 입력칸</h2>
            <button type="button" id="add-row-button" class="icon-button" aria-label="공 입력칸 추가">+</button>
          </div>

          <form id="fighter-form" class="fighter-form">
            <div id="fighter-rows" class="fighter-rows"></div>
            <div class="button-row">
              <button type="submit" id="start-button">시작</button>
            </div>
          </form>
        </section>

        <section class="speed-box">
          <div class="section-header">
            <h2>속도</h2>
            <strong id="speed-label">1.0x</strong>
          </div>
          <label class="slider-field">
            배속 슬라이더
            <input id="speed-slider" type="range" min="1" max="10" step="0.5" value="1" />
          </label>
          <p class="slider-hint">기본 이동 속도는 이전 버전의 2배이며, 여기서 최대 10배까지 늘릴 수 있습니다.</p>
        </section>

        <section class="list-box">
          <h2>현재 원</h2>
          <ul id="live-list" class="info-list empty-list">
            <li>아직 경기장에 나온 원이 없습니다.</li>
          </ul>
        </section>

        <section class="list-box">
          <h2>죽은 순서</h2>
          <ol id="death-list" class="info-list empty-list">
            <li>아직 아무도 죽지 않았습니다.</li>
          </ol>
        </section>
      </aside>

      <main class="panel arena-panel">
        <div class="arena-header">
          <strong>자동 전투장</strong>
          <span>공 입력칸에서 이름과 스탯을 바로 수정한 뒤 한 번에 시작하고, 슬라이더로 속도를 조절하세요.</span>
        </div>
        <canvas id="arena" width="980" height="660" aria-label="Mono Circle Arena"></canvas>
      </main>
    </div>

    <template id="fighter-row-template">
      <div class="fighter-row">
        <div class="fighter-row-fields">
          <label class="grow">
            이름
            <input class="fighter-name" type="text" maxlength="16" placeholder="예: 빛" required />
          </label>
          <label class="bonus-field">
            추가 스탯
            <input class="fighter-bonus" type="number" value="0" min="0" max="99" step="1" />
          </label>
        </div>
        <button type="button" class="remove-row-button ghost-button" aria-label="공 입력칸 삭제">삭제</button>
      </div>
    </template>

    <script src="script.js"></script>
  </body>
</html>
